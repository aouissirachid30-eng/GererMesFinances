<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">

    <div class="card p-4 shadow" style="width: 350px;">

        <h3 class="text-center mb-3">🔐 Connexion</h3>

        <form method="POST" action="/login">

            <input type="text" name="username" class="form-control mb-2" placeholder="Utilisateur" required>

            <input type="password" name="password" class="form-control mb-3" placeholder="Mot de passe" required>

            <button class="btn btn-primary w-100">Se connecter</button>

        </form>

    </div>

</div>

</body>
</html>
