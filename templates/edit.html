<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h3>✏ Modifier transaction</h3>

<form method="POST" class="card p-3">

<label>Date</label>
<input type="date" name="date" value="{{ row.date }}" class="form-control mb-2">

<label>Catégorie</label>
<select name="categorie" class="form-control mb-2">
<option {% if row.categorie=='Revenu' %}selected{% endif %}>Revenu</option>
<option {% if row.categorie=='Dépense fixe' %}selected{% endif %}>Dépense fixe</option>
<option {% if row.categorie=='Dépense variable' %}selected{% endif %}>Dépense variable</option>
</select>

<label>Désignation</label>
<input name="designation" value="{{ row.designation }}" class="form-control mb-2">

<label>Famille</label>
<select name="famille_id" class="form-control mb-2">
{% for f in familles %}
<option value="{{ f.id }}" {% if f.id == row.famille_id %}selected{% endif %}>
{{ f.nom }}
</option>
{% endfor %}
</select>

<label>Montant</label>
<input type="number" step="0.01" name="montant" value="{{ row.montant }}" class="form-control mb-2">

<button class="btn btn-success">💾 Enregistrer</button>

</form>

<a href="/transactions/{{ compte_id }}" class="btn btn-secondary mt-3">Retour</a>

</body>
</html>
